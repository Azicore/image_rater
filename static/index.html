<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Image Rater</title>
<script type="module">
import LocalConfig from './modules/LocalConfig.js';
import KeyEventManager from './modules/KeyEventManager.js';
import StatusBar from './modules/StatusBar.js';
import DirectorySelector from './modules/DirectorySelector.js';
import FileSelector from './modules/FileSelector.js';
import MediaViewer from './modules/MediaViewer.js';
import RatingPanel from './modules/Ratingpanel.js';
import MainMenu from './modules/MainMenu.js';
import SortMenu from './modules/SortMenu.js';

const config = new LocalConfig();
const status = new StatusBar();
const directoryList = new DirectorySelector();
const fileList = new FileSelector(config);
const viewer = new MediaViewer();
const rating = new RatingPanel();
const mainMenu = new MainMenu(config);
const sortMenu = new SortMenu(config);

// ディレクトリの更新
const initialize = async (subdir, forceUpdate = false) => {
	// ステータスバーの更新
	status.updateCurrentDirectory(subdir);
	// レーティングボタンの有効化
	rating.setSubdir(subdir);
	rating.toggleRatingButton(true);
	// ファイル一覧の作成
	await fileList.update(subdir, forceUpdate);
	subdir.subdirNum = fileList.length;
	status.updateCurrentDirectory(subdir);
	// メニュー項目の切り替え
	mainMenu.toggleDisabled('subdirrename', false);
	mainMenu.toggleDisabled('adjust', subdir.subdirNum == 0);
	mainMenu.toggleDisabled('cleanupdir', false);
	mainMenu.toggleDisabled('cleanupthumb', subdir.subdirNum == 0);
};
// ファイルが選択されたとき
fileList.on('select', (file) => {
	// ステータスバーを更新する
	status.updateFileStatus(file);
	// 選択可能なメニュー項目を更新する
	mainMenu.toggleDisabled('move', file === 0);
	mainMenu.toggleDisabled('exchange', file != 2);
	mainMenu.toggleDisabled('resetall', file === 0);
	mainMenu.toggleDisabled('reset', file === 0);
});
// ファイルが開かれたとき
fileList.on('fileopen', (subdir, file) => {
	// ビューアを起動する
	viewer.open(subdir, file);
	KeyEventManager.setActiveHandler('viewer');
});
// ビューアが閉じられたとき
viewer.on('close', () => {
	KeyEventManager.setActiveHandler('default');
});
// ステータスバーからディレクトリ選択メニューが開かれたとき
status.on('directorymenuopen', () => {
	// ディレクトリ選択メニューを表示する
	directoryList.show();
	status.hide();
});
// ディレクトリが選択されたとき
directoryList.on('select', async (subdir) => {
	initialize(subdir);
});
// ファイルの移動先が選択されたとき
directoryList.on('filemove', async (newSubdir) => {
	// ファイル移動を実行する
	const subdir = await fileList.moveFile(newSubdir);
	status.updateCurrentDirectory(subdir);
	mainMenu.toggleDisabled('adjust', subdir.subdirNum == 0);
	mainMenu.toggleDisabled('cleanupthumb', subdir.subdirNum == 0);
});
// ディレクトリ選択メニューが閉じられたとき
directoryList.on('close', () => {
	status.show();
});
// ソートが選択されたとき
sortMenu.on('sort', (sortKey, sortReversed) => {
	// ファイル一覧を更新する
	fileList.setSortFunc(sortKey, sortReversed);
	fileList.update();
});
// ファイル名変更が成功したとき
status.on('filerename', (fileId, newName) => {
	fileList.updateFileName(fileId, newName);
});
// ディレクトリ名変更が成功したとき
status.on('subdirrename', async (subdir) => {
	initialize(subdir);
	directoryList.updateRequired = true;
});
// メニューからファイル移動が選択されたとき
mainMenu.on('filemove', () => {
	directoryList.show(true);
	status.hide();
});
// メニューからディレクトリ名変更が選択されたとき
mainMenu.on('renamesubdir', () => {
	status.renameSubdirectory();
});
// メニューからレーティング操作が選択されたとき
mainMenu.on('ratingope', async (mode) => {
	const subdir = await fileList.ratingOperation(mode);
	fileList.update(subdir);
});
// メニューからレーティングシンボルの表示を切り替えたとき
mainMenu.on('symbol', (toggle) => {
	fileList.toggleRatingSymbol(toggle);
});
// メニューからクリーンアップ系コマンドが選択されたとき
mainMenu.on('cleanup', async (mode) => {
	// 行方不明のディレクトリの削除
	if (mode == 'dir') {
		directoryList.removeMissingDirectories();
	}
	// サムネイルキャッシュの再構築
	if (mode == 'thumb') {
		initialize(fileList.subdir, true);
	}
});
// レーティングを開始したとき
rating.on('open', () => {
	KeyEventManager.setActiveHandler('rating');
});
// レーティングを終了したとき
rating.on('close', (subdir) => {
	KeyEventManager.setActiveHandler('default');
	fileList.update(subdir);
});

</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<ul id="filelist"></ul>
<div id="status">
	<div id="status_current_dir">ディレクトリを選択</div>
	<div id="status_file_name"></div>
	<div id="status_file_props"></div>
	<div id="status_menu">
		<div id="sort" class="status_menu_label">ソート</div>
		<div id="menu" class="status_menu_label">メニュー</div>
		<div id="rating_button">レーティング</div>
	</div>
</div>
<div id="sort_menu" class="menu_body" popover></div>
<div id="main_menu" class="menu_body" popover></div>
<div id="rename" popover></div>
<div id="dirlist" popover>
	<p id="dirlist_msg">ディレクトリを選択：</p>
	<div id="dirlist_dir_block">
		<ul id="dirlist_dir_list"></ul>
	</div>
	<div id="dirlist_subdir_block">
		<p id="dirlist_curr"></p>
		<ul id="dirlist_subdir_list"></ul>
	</div>
</div>
<div id="viewer"></div>
<div id="rating">
	<div id="rating_property_block">
		<table id="rating_property"></table>
		<div id="rating_skip" title="スキップ"></div>
		<div id="rating_close" title="終了"></div>
	</div>
	<div id="rating_image_block">
		<div id="rating_image_1"></div>
		<div id="rating_image_2"></div>
	</div>
</div>
</body>
</html>
